<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indiko Admin · Entrar</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>tailwind.config={darkMode:'class'}</script>
<style>
:root{--brand-red:#FF001E;--brand-cyan:#00BBC5;--red-soft:#FF001E14;--red-hover:#E00019;--cyan-soft:#00BBC514;--success:#16A34A;--success-soft:#16A34A1A;--font-ui:'Montserrat',system-ui,sans-serif;--font-data:'Inter',var(--font-ui);--r-sm:8px;--r-md:12px;--r-lg:16px;--shadow-sm:0 1px 2px rgba(18,17,17,.06);--shadow-lg:0 12px 40px rgba(18,17,17,.14)}
:root,.light{--bg:#FFFFFF;--bg-subtle:#F7F7F6;--surface:#FFFFFF;--surface-2:#F2F2F1;--surface-3:#EDEDEC;--border:#E6E6E4;--text:#121111;--text-muted:#6B6B6B;--text-subtle:#9A9A98}
.dark{--bg:#0E0D0D;--bg-subtle:#161515;--surface:#1A1919;--surface-2:#232222;--surface-3:#2C2A2A;--border:#2E2C2C;--text:#EDEDEC;--text-muted:#9A9A98;--text-subtle:#6B6B6B;--red-soft:#FF001E26;--cyan-soft:#00BBC526;--shadow-lg:0 12px 40px rgba(0,0,0,.6)}
*{-webkit-font-smoothing:antialiased}body{font-family:var(--font-ui);background:var(--bg-subtle);color:var(--text);transition:.25s}
.font-data{font-family:var(--font-data)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;font-weight:600;font-size:.9rem;border-radius:var(--r-md);padding:.8rem 1.25rem;cursor:pointer;transition:.15s;border:1px solid transparent;width:100%}
.btn-primary{background:var(--brand-red);color:#fff}.btn-primary:hover{background:var(--red-hover)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.field-label{display:block;font-size:.8125rem;font-weight:600;margin-bottom:.4rem}
.input{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--r-md);padding:.75rem .9rem;font-size:.9rem;font-family:var(--font-ui)}
.input:focus{outline:none;border-color:var(--brand-red);box-shadow:0 0 0 3px var(--red-soft)}
.input-icon-wrap{position:relative}.input-icon-wrap .lucide{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-subtle)}.input-icon-wrap .input{padding-left:2.6rem}
.otp{width:48px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);color:var(--text);font-family:var(--font-data)}
.otp:focus{outline:none;border-color:var(--brand-red);box-shadow:0 0 0 3px var(--red-soft)}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md">
  <div class="flex items-center justify-center gap-2.5 mb-8">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center font-extrabold text-white" style="background:var(--brand-red)">in</div>
    <div class="leading-tight text-center"><div class="font-extrabold text-lg">Indiko <span style="color:var(--brand-red)">Admin</span></div><div class="text-xs" style="color:var(--text-subtle)">Painel de gestão · Seahub</div></div>
  </div>

  <!-- ETAPA 1: credenciais (mostrada) -->
  <div id="step1" class="card p-7">
    <h2 class="text-xl font-bold mb-1">Acesso restrito</h2>
    <p class="text-sm mb-6" style="color:var(--text-muted)">Entre com suas credenciais de administrador.</p>
    <div class="space-y-4">
      <div><label class="field-label">E-mail corporativo</label><div class="input-icon-wrap"><i data-lucide="mail"></i><input class="input" value="guiga@seahubcoworking.com.br"></div></div>
      <div><label class="field-label">Senha</label><div class="input-icon-wrap"><i data-lucide="lock"></i><input type="password" class="input" value="senha123"></div></div>
      <button class="btn btn-primary" onclick="document.getElementById('step1').classList.add('hidden');document.getElementById('step2').classList.remove('hidden');lucide.createIcons()"><i data-lucide="shield"></i> Continuar</button>
    </div>
  </div>

  <!-- ETAPA 2: 2FA (oculta) -->
  <div id="step2" class="card p-7 hidden">
    <div class="w-12 h-12 rounded-full flex items-center justify-center mb-4" style="background:var(--cyan-soft)"><i data-lucide="smartphone" style="color:var(--brand-cyan)"></i></div>
    <h2 class="text-xl font-bold mb-1">Verificação em duas etapas</h2>
    <p class="text-sm mb-6" style="color:var(--text-muted)">Digite o código de 6 dígitos do seu app autenticador.</p>
    <div class="flex justify-between gap-2 mb-5">
      <input class="otp" maxlength="1" value="4"><input class="otp" maxlength="1" value="8"><input class="otp" maxlength="1" value="1"><input class="otp" maxlength="1" value="9"><input class="otp" maxlength="1"><input class="otp" maxlength="1">
    </div>
    <a href="09-admin-visao-geral.html" class="btn btn-primary"><i data-lucide="check"></i> Verificar e entrar</a>
    <button class="text-xs mt-4 w-full text-center" style="color:var(--text-subtle)">Reenviar código em 0:28</button>
  </div>

  <div class="flex items-center justify-center gap-4 mt-6">
    <a href="01-login-parceiro.html" class="text-xs" style="color:var(--text-subtle)">Sou parceiro indicador</a>
    <span style="color:var(--border)">·</span>
    <button onclick="toggleTheme()" class="text-xs flex items-center gap-1" style="color:var(--text-subtle)"><i data-lucide="moon" style="width:14px;height:14px"></i> <span id="themeLabel">Escuro</span></button>
  </div>
</div>
<script>
(function(){if(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.classList.add('dark')})();
function toggleTheme(){const h=document.documentElement;h.classList.toggle('dark');document.getElementById('themeLabel').textContent=h.classList.contains('dark')?'Claro':'Escuro';}
lucide.createIcons();
if(document.documentElement.classList.contains('dark'))document.getElementById('themeLabel').textContent='Claro';
</script>
</body>
</html>
