<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seahub · Recebemos seu contato</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>tailwind.config={darkMode:'class'}</script>
<style>
:root{--brand-red:#FF001E;--brand-cyan:#00BBC5;--red-soft:#FF001E14;--red-hover:#E00019;--cyan-soft:#00BBC514;--success:#16A34A;--success-soft:#16A34A1A;--font-ui:'Montserrat',system-ui,sans-serif;--font-data:'Inter',var(--font-ui);--r-md:12px;--r-lg:16px;--shadow-sm:0 1px 2px rgba(18,17,17,.06)}
:root,.light{--bg:#FFFFFF;--bg-subtle:#F7F7F6;--surface:#FFFFFF;--surface-2:#F2F2F1;--border:#E6E6E4;--text:#121111;--text-muted:#6B6B6B;--text-subtle:#9A9A98}
.dark{--bg:#0E0D0D;--bg-subtle:#161515;--surface:#1A1919;--surface-2:#232222;--border:#2E2C2C;--text:#EDEDEC;--text-muted:#9A9A98;--text-subtle:#6B6B6B}
*{-webkit-font-smoothing:antialiased}body{font-family:var(--font-ui);background:var(--bg);color:var(--text);transition:.25s}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;font-weight:600;font-size:.9rem;border-radius:var(--r-md);padding:.8rem 1.5rem;cursor:pointer;border:1px solid transparent;text-decoration:none}
.btn-wa{background:#25D366;color:#fff}.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
  <div class="w-20 h-20 rounded-full flex items-center justify-center mb-6" style="background:var(--success-soft)"><i data-lucide="check" style="width:40px;height:40px;color:var(--success)"></i></div>
  <h1 class="text-3xl font-extrabold tracking-tight mb-3">Recebemos seu contato! 🎉</h1>
  <p class="text-lg max-w-md mb-2" style="color:var(--text-muted)">Obrigado pelo interesse no Seahub. Nossa equipe vai te chamar no WhatsApp em até <strong style="color:var(--text)">1 dia útil</strong> com a condição especial da Mariana.</p>
  <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full my-5 text-sm" style="background:var(--red-soft);color:var(--brand-red)"><i data-lucide="gift" style="width:15px;height:15px"></i> Cupom <strong class="font-data">MARIANA10</strong> garantido</div>
  <div class="flex flex-col sm:flex-row gap-3">
    <a href="#" class="btn btn-wa"><i data-lucide="message-circle"></i> Adiantar pelo WhatsApp</a>
    <a href="15-landing-cobranded.html" class="btn btn-ghost"><i data-lucide="arrow-left"></i> Voltar</a>
  </div>
  <p class="text-sm mt-10" style="color:var(--text-subtle)">Seahub Coworking · Natal/RN</p>
<script>(function(){if(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.classList.add('dark')})();lucide.createIcons();</script>
</body>
</html>
