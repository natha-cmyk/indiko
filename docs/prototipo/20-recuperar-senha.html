<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indiko · Recuperar senha</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>tailwind.config={darkMode:'class'}</script>
<style>
:root{--brand-red:#FF001E;--brand-cyan:#00BBC5;--red-soft:#FF001E14;--red-hover:#E00019;--cyan-soft:#00BBC514;--success:#16A34A;--success-soft:#16A34A1A;--font-ui:'Montserrat',system-ui,sans-serif;--font-data:'Inter',var(--font-ui);--r-sm:8px;--r-md:12px;--r-lg:16px;--shadow-sm:0 1px 2px rgba(18,17,17,.06);--shadow-lg:0 12px 40px rgba(18,17,17,.14)}
:root,.light{--bg:#FFFFFF;--bg-subtle:#F7F7F6;--surface:#FFFFFF;--surface-2:#F2F2F1;--surface-3:#EDEDEC;--border:#E6E6E4;--text:#121111;--text-muted:#6B6B6B;--text-subtle:#9A9A98}
.dark{--bg:#0E0D0D;--bg-subtle:#161515;--surface:#1A1919;--surface-2:#232222;--surface-3:#2C2A2A;--border:#2E2C2C;--text:#EDEDEC;--text-muted:#9A9A98;--text-subtle:#6B6B6B;--red-soft:#FF001E26;--cyan-soft:#00BBC526;--shadow-lg:0 12px 40px rgba(0,0,0,.6)}
*{-webkit-font-smoothing:antialiased}body{font-family:var(--font-ui);background:var(--bg-subtle);color:var(--text);transition:.25s}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;font-weight:600;font-size:.9rem;border-radius:var(--r-md);padding:.8rem 1.25rem;cursor:pointer;transition:.15s;border:1px solid transparent;width:100%}
.btn-primary{background:var(--brand-red);color:#fff}.btn-primary:hover{background:var(--red-hover)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.field-label{display:block;font-size:.8125rem;font-weight:600;margin-bottom:.4rem}
.input{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--r-md);padding:.75rem .9rem;font-size:.9rem;font-family:var(--font-ui)}
.input:focus{outline:none;border-color:var(--brand-red);box-shadow:0 0 0 3px var(--red-soft)}
.input-icon-wrap{position:relative}.input-icon-wrap .lucide{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-subtle)}.input-icon-wrap .input{padding-left:2.6rem}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md">
  <div class="flex items-center justify-center gap-2.5 mb-6"><div class="w-9 h-9 rounded-xl flex items-center justify-center font-extrabold text-white" style="background:var(--brand-red)">in</div><span class="font-extrabold text-lg">Indiko</span></div>

  <!-- etapa 1: pedir e-mail -->
  <div id="step1" class="card p-7">
    <div class="w-12 h-12 rounded-full flex items-center justify-center mb-4" style="background:var(--cyan-soft)"><i data-lucide="key-round" style="color:var(--brand-cyan)"></i></div>
    <h2 class="text-xl font-bold mb-1">Esqueceu a senha?</h2>
    <p class="text-sm mb-6" style="color:var(--text-muted)">Informe seu e-mail e enviaremos um link para redefinir.</p>
    <div class="space-y-4">
      <div><label class="field-label">E-mail</label><div class="input-icon-wrap"><i data-lucide="mail"></i><input class="input" placeholder="voce@email.com"></div></div>
      <button class="btn btn-primary" onclick="document.getElementById('step1').classList.add('hidden');document.getElementById('step2').classList.remove('hidden');lucide.createIcons()"><i data-lucide="send"></i> Enviar link</button>
    </div>
  </div>

  <!-- etapa 2: definir nova senha (simula chegada pelo link) -->
  <div id="step2" class="card p-7 hidden">
    <div class="w-12 h-12 rounded-full flex items-center justify-center mb-4" style="background:var(--success-soft)"><i data-lucide="mail-check" style="color:var(--success)"></i></div>
    <h2 class="text-xl font-bold mb-1">Defina uma nova senha</h2>
    <p class="text-sm mb-6" style="color:var(--text-muted)">Enviamos um link para seu e-mail. Abaixo, a tela de redefinição.</p>
    <div class="space-y-4">
      <div><label class="field-label">Nova senha</label><div class="input-icon-wrap"><i data-lucide="lock"></i><input type="password" class="input" placeholder="Mínimo 8 caracteres"></div></div>
      <div><label class="field-label">Confirmar senha</label><div class="input-icon-wrap"><i data-lucide="lock"></i><input type="password" class="input" placeholder="Repita a senha"></div></div>
      <a href="01-login-parceiro.html" class="btn btn-primary"><i data-lucide="check"></i> Salvar e entrar</a>
    </div>
  </div>

  <p class="text-center text-sm mt-6" style="color:var(--text-muted)"><a href="01-login-parceiro.html" class="font-semibold" style="color:var(--brand-red)">Voltar ao login</a></p>
</div>
<script>(function(){if(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.classList.add('dark')})();lucide.createIcons();</script>
</body>
</html>
